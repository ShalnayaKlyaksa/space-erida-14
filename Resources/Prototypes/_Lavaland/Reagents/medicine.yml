- type: reagent
  id: VitriumFroth
  name: reagent-name-vitrium-froth
  group: Medicine
  desc: reagent-desc-vitrium-froth
  physicalDesc: reagent-physical-desc-exotic-smelling
  flavor: sweet
  color: "#d3a308"
  metabolisms:
    Bloodstream:
      effects:
      - !type:EvenHealthChange
        damage:
          Brute: -2
          Burn: -3

- type: reagent
  id: SerakaExtract
  name: reagent-name-seraka-extract
  group: Medicine
  desc: reagent-desc-seraka-extract
  physicalDesc: reagent-physical-desc-sticky
  flavor: metallic
  color: "#00767c"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Bloodloss: -1
      - !type:ModifyBloodLevel
        amount: 1
      - !type:HealthChange # Overdose can cause blood to clot in the veins
        conditions:
        - !type:ReagentCondition
          reagent: SerakaExtract
          min: 8
        damage:
          types:
            Bloodloss: 7

- type: reagent
  id: MinersSalve
  name: reagent-name-minerssalve
  group: Medicine
  desc: reagent-desc-minerssalve
  physicalDesc: reagent-physical-desc-shiny
  flavor: metallic
  color: "#f2c777"
  recognizable: true
  metabolisms:
    Bloodstream:
      effects:
      - !type:ModifyBloodLevel
        amount: 1.5
        conditions:
        - !type:PressureThreshold
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:HealthChange
        damage:
          types:
            Bloodloss: -1.25
        conditions:
        - !type:PressureThreshold
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:EvenHealthChange
        damage:
          Burn: -5
          Brute: -3
        conditions:
        - !type:PressureThreshold
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: MinersSalve
          min: 21
        damage:
          types:
            Poison: 0.5
      - !type:Jitter
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.1
      - !type:Emote
        emote: Scream
        probability: 0.05
        #It's balanced I swear!
