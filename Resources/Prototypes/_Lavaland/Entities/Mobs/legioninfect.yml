- type: entity
  id: MobBaseNpcDungeon
  parent:
  - SimpleSpaceMobBase
  - StripableInventoryBase
  abstract: true
  components:
  - type: HTN
    blackboard:
      VisionRadius: !type:Single
        36
      AggroVisionRadius: !type:Single
        30
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
      fix2:
        shape:
          !type:PhysShapeCircle
          radius: 1
        hard: false
        mask:
        - HighImpassable
        layer:
        - MobLayer
      fix3:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        density: 300
        layer:
        - Opaque
        - BulletImpassable
  - type: Inventory
    templateId: carman
  - type: UniversalLanguageSpeaker
  - type: CombatMode
  - type: Stripping
  - type: Strippable
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: ComplexInteraction
  - type: StatusEffects
    allowed:
      - Stun
      - KnockedDown
      - SlowedDown
      - Stutter
      - Electrocution
      - ForcedSleep
      - TemporaryBlindness
      - StaminaModifier
  - type: ZombieImmune
  - type: Rotatable
  - type: InputMover
  - type: MobMover
  - type: MeleeWeapon
    range: 1.5
    angle: 0
    animation: WeaponArcFist
    soundHit:
        collection: Punch
    damage:
        types:
          Blunt: 5
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: NpcFactionMember
    factions:
      - SimpleNeutral
  - type: Hands
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      50: 0.5
  - type: Stamina
    baseCritThreshold: 100
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 30
    bloodlossThreshold: 0
  - type: Puller
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Tag
    tags:
      - CannotSuicide
      - DoorBumpOpener
      - FootstepSound
      - CanPilot

- type: entity
  name: зомбированный
  id: MobLegionZombie
  parent:
  - MobBaseNpcDungeon
  - LavalandMobBase
  suffix: Xen suppa Zombie Base
  description: Zombie.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/legioninfect.rsi
    layers:
    - state: human
    - state: human-scars
    - state: human-layer
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: legion
  - type: DamageStateVisuals
    states:
      Alive:
        Base: legion
      Dead:
        Base: null
  - type: EmoteOnDamage
    emotes:
    - Pain
    emoteChance: 1
  - type: Emoting
  - type: Vocal
    sounds:
      Male: ZombieHeadcrabed
      Female: ZombieHeadcrabed
      Unsexed: ZombieHeadcrabed
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Prying
    pryPowered: !type:Bool
        true
    force: !type:Bool
      true
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Reactive
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcClaw
    soundHit:
        path: /Audio/_Lavaland/Mobs/Legion/claw_strike.ogg
        params:
          volume: 5
    damage:
        types:
          Slash: 7
          Structural: 15
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: NpcFactionMember
    factions:
      - Lavafauna
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: EmitSoundOnTrigger
    sound:
      collection: HeadcrabDeath
      params:
        volume: 3
  - type: SpawnOnTrigger
    proto: MobLegionSkull
  - type: TemperatureProtection
  - type: Temperature
  - type: ReplacementAccent
    accent: zombie

- type: inventoryTemplate
  id: carman
  slots:
    - name: pocket1
      slotTexture: pocket
      slotFlags: POCKET
      stripTime: 5
      uiWindowPos: 1,0
      strippingWindowPos: 0,0
      displayName: Pocket 1

- type: emoteSounds
  id: ZombieHeadcrabed
  params:
    variation: 0.125
    volume: -5
  sounds:
    Pain:
      collection: ZombiePain

- type: emote
  id: Pain
  name: pain
  chatMessages: ["chat-emote-msg-gasp"]
  chatTriggers:
   - pain

- type: soundCollection
  id: ZombiePain
  files:
    - /Audio/_Lavaland/Mobs/Legion/pain1.ogg
    - /Audio/_Lavaland/Mobs/Legion/pain2.ogg
    - /Audio/_Lavaland/Mobs/Legion/pain3.ogg
    - /Audio/_Lavaland/Mobs/Legion/pain4.ogg
    - /Audio/_Lavaland/Mobs/Legion/pain5.ogg
    - /Audio/_Lavaland/Mobs/Legion/pain6.ogg

- type: soundCollection
  id: HeadcrabDeath
  files:
  - /Audio/_Lavaland/Mobs/Legion/die1.ogg
  - /Audio/_Lavaland/Mobs/Legion/die2.ogg

- type: soundCollection
  id: HEVDeath
  files:
  - /Audio/_Lavaland/Mobs/Legion/hzv1.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv2.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv3.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv4.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv5.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv6.ogg
  - /Audio/_Lavaland/Mobs/Legion/hzv7.ogg
