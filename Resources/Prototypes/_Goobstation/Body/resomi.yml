- type: markingsGroup
  parent: Undergarments
  id: Resomi
  limits:
    enum.HumanoidVisualLayers.Head:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 10
      required: true
      default: [ ResomiLArmFeathers ]
    enum.HumanoidVisualLayers.RHand:
      limit: 10
      required: true
      default: [ ResomiRArmFeathers ]
    enum.HumanoidVisualLayers.LLeg:
      limit: 10
      required: true
      default: [ ResomiLLegFeathers ]
    enum.HumanoidVisualLayers.RLeg:
      limit: 10
      required: true
      default: [ ResomiRLegFeathers ]
    enum.HumanoidVisualLayers.LFoot:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 2
      required: true
      default: [ ResomiTail, ResomiTailFeathers ]
    enum.HumanoidVisualLayers.Special:
      limit: 10
      required: false

