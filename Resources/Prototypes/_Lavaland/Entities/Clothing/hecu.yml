- type: entity
  parent: ClothingOuterArmorBasic
  id: ClothingOuterArmorVestPCV
  name: Энергетический боевой жилет P.C.V.
  description: Powered Combat Vest предназначен для защиты пользователя от химических, биологических, радиоактивных и физических угроз во время операций.
  components:
  - type: Sprite
    sprite: _Lavaland/Clothing/OuterClothing/Armor/PCV.rsi
  - type: Clothing
    sprite: _Lavaland/Clothing/OuterClothing/Armor/PCV.rsi
    equipSound: /Audio/_Lavaland/Clothing/pcv/01_pcv_logon.ogg
    quickEquip: false
    equipDelay: 5
    unequipDelay: 2
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.4
        Heat: 0.6
        Radiation: 0.1
        Caustic: 0.1
  - type: StaminaResistance
    damageCoefficient: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 1.3
    sprintModifier: 1.0
  - type: ClothingGrant
    component:
    - type: SolutionRegeneration
      solution: bloodstream
      generated:
        reagents:
        - ReagentId: TranexamicAcidPlus
          Quantity: 0.2

- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetHECU
  name: защитный шлем от P.C.V.
  description: Шлем от энергетического боевого жилета, не сильно отличается чем-то от обычного армейского шлема, но все же.
  components:
  - type: Sprite
    sprite: _Lavaland/Clothing/Head/Helmet/hecuhelmet.rsi
  - type: Clothing
    sprite: _Lavaland/Clothing/Head/Helmet/hecuhelmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.9
        Radiation: 0.6
        Caustic: 0.4

- type: entity
  parent: ClothingHeadHelmetHECU
  id: ClothingHeadHelmetHECUNVG
  name: защитный шлем от P.C.V. с прибором ночного зрения
  description: Шлем от энергетического боевого жилета, не сильно отличается чем-то от обычного армейского шлема, но все же.
  components:
  - type: Sprite
    sprite: _Lavaland/Clothing/Head/Helmet/hecuhelmet.rsi
    state: icon-nvg
  - type: Clothing
    sprite: _Lavaland/Clothing/Head/Helmet/hecuhelmet.rsi
    equippedState: equipped-HELMET-nvg
  - type: NightVision
    flashDurationMultiplier: 2
    isEquipment: true

- type: entity
  parent: ClothingBackpackERTSecurity
  id: ClothingSathelHECU
  name: сумка отряда H.E.C.U.
  description: Сумка спец-отделения Hazardous Environment Combat Unit, компактная РПС что позволяет носить с собой множество снаряжения из-за специфики отряда, эта сумка полностью защищена от внешних факторов.
  components:
  - type: Sprite
    sprite: _Lavaland/Clothing/Back/Satchels/hecu.rsi
  - type: Clothing
    sprite: _Lavaland/Clothing/Back/Satchels/hecu.rsi

- type: entity
  parent: ClothingBeltMilitaryWebbing
  id: ClothingBeltHECU
  name: пояс отряда H.E.C.U.
  description: Пояс спец-отделения Hazardous Environment Combat Unit, из-за назначения отряда, их снаряжение выполнено из особых материалов которая устойчива ко множеству опасных внешних условий, этот пояс исключением не стал.
  components:
  - type: Storage
    grid:
    - 0,0,5,2
  - type: Sprite
    sprite: _Lavaland/Clothing/Belt/hecubelt.rsi
  - type: Clothing
    sprite: _Lavaland/Clothing/Belt/hecubelt.rsi

