- type: entity
  name: H.E.V. unit
  id: MobLegionZombieHEV
  parent: MobLegionZombie
  suffix: Xen suppa ZombieHEV
  description: Infected in a HEV suit, the armor appears to still protect its wearer from most types of threats and attempts to reanimate him, the suit's drives aid in movement, which greatly helps the infected catch up with their victims.
  components:
  - type: Sprite
    layers:
    - state: human
    - state: human-layer
    - state: equipped-OUTERCLOTHING
      sprite: _Lavaland/Equipment/hev_suit.rsi
    - state: human-scars
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: legion
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
        types:
          Slash: 4
          Structural: 25
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      140: 0.5
      149: 0.5
      150: 2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnEntitiesBehavior
        spawn:
          OrganAnimalHeart:
            min: 1
            max: 1
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: EmitSoundOnTrigger
    sound:
      collection: HEVDeath
      params:
        volume: 3
  - type: TemperatureProtection
  - type: Temperature
  - type: NoSlip
  - type: Damageable
    damageModifierSet: HEVArmor
  - type: Loadout
    prototypes: [NPCHEV]
