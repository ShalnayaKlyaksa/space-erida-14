- type: alertLevels
  id: stationAlerts
  defaultLevel: green
  levels:
    green:
      announcement: alert-level-green-announcement
      sound: /Audio/Announcements/announce.ogg
      color: Green
      emergencyLightColor: LawnGreen
      shuttleTime: 600
    blue:
      announcement: alert-level-blue-announcement
      sound:
        path: /Audio/_Erida/Misc/alerts/short_blue.ogg
        params:
          volume: -2
      color: DodgerBlue
      emergencyLightColor: DodgerBlue
      shuttleTime: 600
    violet:
      announcement: alert-level-violet-announcement
      sound: /Audio/_Erida/Misc/alerts/short_purple.ogg
      color: Violet
      emergencyLightColor: Violet
      forceEnableEmergencyLights: true
      shuttleTime: 600
    yellow:
      announcement: alert-level-yellow-announcement
      sound: /Audio/_Erida/Misc/alerts/short_yellow.ogg
      color: Yellow
      emergencyLightColor: Goldenrod
      forceEnableEmergencyLights: true
      shuttleTime: 600
    amber:
      announcement: alert-level-amber-announcement
      sound:
        path: /Audio/_Erida/Misc/alerts/short_amber.ogg
        params:
          volume: 4
      color: Orange
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 600
    red:
      announcement: alert-level-red-announcement
      sound:
        path: /Audio/_Erida/Misc/alerts/short_red.ogg
        params:
          volume: -2
      color: Red
      emergencyLightColor: Red
      forceEnableEmergencyLights: true
      shuttleTime: 600 #No reduction in time as we don't have swiping for red alert like in /tg/. Shuttle times are intended to create friction, so having a way to brainlessly bypass that would be dumb.
    gamma:
      announcement: alert-level-gamma-announcement
      selectable: false
      sound:
        path: /Audio/_Corvax/Misc/siren.ogg # _Corvax: Return of the old siren sound
        params:
          volume: -4
      disableSelection: true
      color: PaleVioletRed
      emergencyLightColor: PaleVioletRed
      forceEnableEmergencyLights: true
    delta:
      announcement: alert-level-delta-announcement
      selectable: false
      sound:
        path: /Audio/_Backmen/Misc/new-style-alerts/delta_code_new_style.ogg
        params:
          volume: -4
      disableSelection: true
      color: DarkRed
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 1200
    epsilon:
      announcement: alert-level-epsilon-announcement
      selectable: false
      sound:
        path: /Audio/_Backmen/Misc/new-style-alerts/epsilon_code_new_style.ogg
        params:
          volume: -2
      disableSelection: true
      color: DarkViolet
      emergencyLightColor: DarkViolet
      forceEnableEmergencyLights: true
      shuttleTime: 1200
    #_backmen end
    #Erida start
    sierra:
      announcement: alert-level-sierra-announcement
      selectable: false
      sound: /Audio/_Backmen/Misc/new-style-alerts/sigma_code_new_style.ogg
      disableSelection: true
      color: LightSeaGreen
      emergencyLightColor: Aqua
      forceEnableEmergencyLights: true
      shuttleTime: 1200
    enigma:
      announcement: alert-level-enigma-announcement
      selectable: false
      sound: /Audio/_Erida/Misc/alerts/enigma_new_style_alert.ogg
      disableSelection: true
      color: '#EF7200'
      emergencyLightColor: '#EF7200'
      forceEnableEmergencyLights: true
      shuttleTime: 120
    #Erida end
