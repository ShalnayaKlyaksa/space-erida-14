- type: entity
  name: UEG marine
  id: MobLegionZombieHecu
  parent: MobLegionZombie
  suffix: Xen suppa Zombie HECU
  description: Infected United Earth Government marine, he is equipped with PCV and it seems that the infection has pretty much battered the equipment.
  components:
  - type: MeleeWeapon
    damage:
        types:
          Slash: 12
          Structural: 35
  - type: Sprite
    layers:
    - state: human
    - state: equipped-INNERCLOTHING
      sprite: _Lavaland/Clothing/Uniforms/Jumpsuit/urbanCM.rsi
    - state: equipped-HAND
      sprite: Clothing/Hands/Gloves/Color/black.rsi
    - state: equipped-FEET
      sprite: Clothing/Shoes/Boots/combatboots.rsi
    - state: equipped-OUTERCLOTHING
      sprite: _Lavaland/Clothing/OuterClothing/Armor/PCV.rsi
    - state: human-scars
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: legion
  - type: MobThresholds
    thresholds:
      0: Alive
      250: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      250: 1
  - type: Damageable
    damageModifierSet: CombineArmor
  - type: MovementSpeedModifier
    baseSprintSpeed: 4.5
  - type: Loadout
    prototypes: [NPCMarine]

- type: entity
  name: science
  id: MobLegionZombieScience
  parent: MobLegionZombie
  suffix: Xen suppa ZombieSCIENCE
  description: Infected, judging by the access card, a scientist from some research complex, his clothes are already gradually rotting, and his body is disfigured, but no traces of decomposition are visible.
