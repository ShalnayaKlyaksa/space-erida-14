- type: entity
  name: nanotrasen navy saber
  parent: [ BaseSword, BaseCommandContraband ]
  id: CaptainNTNavySabre
  description:
  components:
  # handling sounds edit start
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Erida/Items/handling/sabre_drop.ogg
  # handling sounds edit start
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Melee/nanotrasen_navy_saber.rsi
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Slash: 30 #cmon, it has to be at least BETTER than the rest.
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: .25
    spread: 90
  - type: Item
    storedSprite:
      state: storage
      sprite: Objects/Weapons/Melee/captain_sabre_storage_64x.rsi #Done in 64x64 because it looks way too puny in 32x32
    shape:
    - 0,0,0,3
  - type: Tag
    tags:
    - CaptainNTNavySabre
  - type: DisarmMalus
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-inanimate
    weight: 0.0002 # 5,000 times less likely than 1 regular animal
  - type: PirateAccent
    # not putting a BlockMovement component here cause that's funny.
  - type: StealTarget
    stealGroup: CaptainSword

- type: entity
  name: syndicate rapier
  parent: [ BaseSword, BaseSyndicateContraband ]
  id: SyndicateRapier
  description: A thin blade made of plastitanium with a diamond tip.
  components:
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Melee/syndicate_rapier.rsi
  - type: DisarmMalus
    malus: 0.6
  - type: MeleeWeapon
    resistanceBypassWide: false
    wideAnimationRotation: -135
    angle: 0
    animation: WeaponArcThrust
    attackRate: 1.5
    damage:
      types:
        Piercing: 20
    resistanceBypass: true
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: 0.15
    spread: 90
  - type: Item
    sprite: _Erida/Objects/Weapons/Melee/syndicate_rapier.rsi
  - type: Tag
    tags:
    - SyndicateRapier

- type: entity
  name: Golden rapier
  parent: CaptainSabre
  id: GoldenRapier
  description: Ancient, forged for those who drunked by their own self-importance.
  components:
    - type: Sprite
      sprite: _Erida/Objects/Weapons/Melee/golden_rapier.rsi
    - type: MeleeWeapon
      attackRate: 3
      damage:
        types:
          Piercing: 7.5
    - type: Item
      sprite: _Erida/Objects/Weapons/Melee/golden_rapier.rsi
