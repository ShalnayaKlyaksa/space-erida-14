    - state: human-scars
    - state: human-layer
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: legion
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: Loadout
    prototypes: [NPCScience]

- type: entity
